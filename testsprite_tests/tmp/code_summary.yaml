version: "2"
type: frontend
tech_stack:
  - react
  - typescript
  - vite
  - tailwindcss
routes:
  - path: /report
    file: src/pages/ReportScam.tsx
    auth_required: false
    description: Report scam form with local storage draft restoring
features:
  - name: Auto-Save Report Draft
    description: Automatically restore user form inputs from local storage upon page load if saved within 24 hours, and clear upon successful report submission.
    files:
      - src/pages/ReportScam.tsx
    entry_route: /report
    user_interactions:
      - Open report page
      - See previously entered draft values restored
      - Submit report successfully to clear the draft
    api_calls: []
    auth_required: false
  - name: Proactive JWT Token Refresh Context
    description: Automatically refresh the authentication JWT token proactively every 30 seconds if it is within 5 minutes of expiry.
    files:
      - src/context/AuthContext.tsx
      - src/lib/api.ts
    entry_route: /
    user_interactions: []
    api_calls:
      - method: POST
        endpoint: /api/auth/refresh
    auth_required: true
known_limitations: []
